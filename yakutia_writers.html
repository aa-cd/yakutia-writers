<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Писатели-переводчики Якутии</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0c;
    --surface: #16180f;
    --surface2: #1e2215;
    --border: #2e3322;
    --accent: #c8a84b;
    --accent2: #8cb87a;
    --text: #e8e4d8;
    --muted: #8a8878;
    --card-hover: #1a1d13;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,15,12,0.95);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
    line-height: 1.2;
  }
  .logo span { display: block; font-size: 0.7rem; font-weight: 400; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-search {
    flex: 1;
    max-width: 520px;
    position: relative;
  }
  .header-search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.55rem 1rem 0.55rem 2.6rem;
    border-radius: 6px;
    font-family: 'Geologica', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .header-search input:focus { border-color: var(--accent); }
  .header-search svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 15px; height: 15px;
  }
  .stats-bar {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .stats-bar b { color: var(--accent); font-weight: 500; }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 72px);
  }

  /* SIDEBAR */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1.2rem;
    position: sticky;
    top: 72px;
    height: calc(100vh - 72px);
    overflow-y: auto;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .filter-group { margin-bottom: 1.6rem; }
  .filter-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }
  .filter-group select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.7rem;
    border-radius: 5px;
    font-family: 'Geologica', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-group select:focus { border-color: var(--accent); }
  .filter-group select option { background: #1a1d13; }

  .toggle-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .toggle-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.65rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Geologica', sans-serif;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0f0c; font-weight: 500; }

  .clear-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem;
    border-radius: 5px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Geologica', sans-serif;
    margin-top: 0.5rem;
  }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MAIN */
  main {
    padding: 1.5rem 2rem;
  }

  .view-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    align-items: center;
  }
  .view-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .view-btn.active, .view-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.7rem;
    border-radius: 5px;
    font-family: 'Geologica', sans-serif;
    font-size: 0.8rem;
    outline: none;
    margin-left: auto;
    cursor: pointer;
  }
  .sort-select option { background: #1a1d13; }

  /* GRID */
  .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .list-view { display: flex; flex-direction: column; gap: 0.5rem; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(200,168,75,0.08); }
  .card:hover::before { opacity: 1; }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: var(--text);
    line-height: 1.3;
  }
  .card-pseudo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .card-dates {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .card-bio {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.7rem;
  }
  .card-langs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .lang-tag {
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    border: 1px solid;
  }
  .lang-from { border-color: #3a4a2a; color: var(--accent2); background: rgba(140,184,122,0.08); }
  .lang-to { border-color: #4a3a1a; color: var(--accent); background: rgba(200,168,75,0.08); }
  .works-count {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .works-count b { color: var(--accent); }

  /* LIST CARD */
  .list-view .card {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 0.8rem 1.2rem;
  }
  .list-view .card-name { font-size: 1rem; margin-bottom: 0.1rem; }
  .list-view .card-bio { margin-bottom: 0; -webkit-line-clamp: 1; }
  .list-view .card-left { flex: 1; }
  .list-view .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; white-space: nowrap; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.3; }
  .empty p { font-size: 0.9rem; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 760px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .modal-header {
    padding: 1.8rem 2rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .modal-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }
  .modal-title h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .modal-title .pseudo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
    margin-top: 0.2rem;
  }
  .modal-title .dates {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .modal-close {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  .modal-body { padding: 1.5rem 2rem; }

  .section-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 0.7rem;
    margin-top: 1.2rem;
    font-weight: 500;
  }
  .section-title:first-child { margin-top: 0; }

  .info-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 0.6rem;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .info-item { background: var(--surface2); border-radius: 6px; padding: 0.6rem 0.8rem; }
  .info-item .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
  .info-item .value { font-size: 0.85rem; }

  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.8rem;
  }
  .tag-chip {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    background: rgba(200,168,75,0.1);
    border: 1px solid rgba(200,168,75,0.25);
    color: var(--accent);
  }

  /* WORKS TABLE */
  .works-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-top: 0.5rem;
  }
  .works-table th {
    text-align: left;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .works-table td {
    padding: 0.6rem 0.7rem;
    border-bottom: 1px solid rgba(46,51,34,0.5);
    vertical-align: top;
    line-height: 1.4;
  }
  .works-table tr:last-child td { border-bottom: none; }
  .works-table tr:hover td { background: rgba(255,255,255,0.02); }
  .work-title { color: var(--text); font-weight: 400; }
  .work-author { color: var(--muted); font-size: 0.78rem; }
  .work-bib { color: var(--muted); font-size: 0.74rem; margin-top: 0.2rem; line-height: 1.3; }
  .work-year { color: var(--accent2); white-space: nowrap; }
  .work-genre { color: var(--muted); white-space: nowrap; }
  .lang-pair { display: flex; flex-direction: column; gap: 0.2rem; }

  /* SCROLL TOP */
  .pagination {
    display: flex;
    justify-content: center;
    padding: 2rem 0;
    gap: 0.5rem;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    Писатели&#8209;переводчики<span>Республики Саха (Якутия)</span>
  </div>
  <div class="header-search">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Поиск по имени, произведению, автору…">
  </div>
  <div class="stats-bar" id="statsBar">Загрузка…</div>
</header>

<div class="layout">
  <aside>
    <div class="filter-group">
      <div class="filter-label">Язык оригинала</div>
      <select id="filterLangFrom">
        <option value="">Все языки</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Язык перевода</div>
      <select id="filterLangTo">
        <option value="">Все языки</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Жанр</div>
      <select id="filterGenre">
        <option value="">Все жанры</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">Период</div>
      <div class="toggle-group" id="periodFilter">
        <button class="toggle-btn" data-period="all">Все</button>
        <button class="toggle-btn" data-period="dead">Ушедшие</button>
        <button class="toggle-btn" data-period="alive">Ныне живущие</button>
      </div>
    </div>
    <button class="clear-btn" onclick="clearFilters()">✕ Сбросить фильтры</button>
  </aside>

  <main>
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" title="Сетка" onclick="setView('grid')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/>
          <rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="btnList" title="Список" onclick="setView('list')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="6" width="14" height="2" rx="1"/>
          <rect x="0" y="11" width="14" height="2" rx="1"/>
        </svg>
      </button>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="name">По фамилии</option>
        <option value="works">По кол-ву работ</option>
        <option value="birth">По году рождения</option>
      </select>
    </div>
    <div id="cardsContainer"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar"></div>
      <div class="modal-title">
        <h2 id="modalName"></h2>
        <div class="pseudo" id="modalPseudo" style="display:none"></div>
        <div class="dates" id="modalDates"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

let currentView = 'grid';
let activePeriod = 'all';
let filtered = [...DATA];

// Collect unique values for filters
const langsFrom = new Set(), langsTo = new Set(), genres = new Set();
DATA.forEach(p => p.works.forEach(w => {
  if (w.lang_from) w.lang_from.split(',').forEach(l => langsFrom.add(l.trim()));
  if (w.lang_to) w.lang_to.split(',').forEach(l => langsTo.add(l.trim()));
  if (w.genre && w.genre !== '-') genres.add(w.genre.trim());
}));

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  [...values].sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}
populateSelect('filterLangFrom', langsFrom);
populateSelect('filterLangTo', langsTo);
populateSelect('filterGenre', genres);

// Period toggles
document.querySelectorAll('[data-period]').forEach(btn => {
  if (btn.dataset.period === 'all') btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePeriod = btn.dataset.period;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterLangFrom').addEventListener('change', render);
document.getElementById('filterLangTo').addEventListener('change', render);
document.getElementById('filterGenre').addEventListener('change', render);

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterLangFrom').value = '';
  document.getElementById('filterLangTo').value = '';
  document.getElementById('filterGenre').value = '';
  activePeriod = 'all';
  document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-period="all"]').classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function formatDate(d) {
  if (!d) return null;
  const parts = d.split('-');
  if (parts.length === 3) {
    const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
  }
  return d;
}

function getInitials(name) {
  if (!name) return '?';
  const parts = name.split(' ');
  return parts.slice(0,2).map(p => p[0]).join('').toUpperCase();
}

function getPersonLangs(person) {
  const from = new Set(), to = new Set();
  person.works.forEach(w => {
    if (w.lang_from) w.lang_from.split(',').forEach(l => from.add(l.trim()));
    if (w.lang_to) w.lang_to.split(',').forEach(l => to.add(l.trim()));
  });
  return { from: [...from], to: [...to] };
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const lf = document.getElementById('filterLangFrom').value;
  const lt = document.getElementById('filterLangTo').value;
  const gn = document.getElementById('filterGenre').value;
  const sort = document.getElementById('sortSelect').value;

  filtered = DATA.filter(p => {
    // Search
    if (q) {
      const inName = p.name && p.name.toLowerCase().includes(q);
      const inPseudo = p.pseudonym && p.pseudonym.toLowerCase().includes(q);
      const inBio = p.bio && p.bio.toLowerCase().includes(q);
      const inBirth = p.birthplace && p.birthplace.toLowerCase().includes(q);
      const inWorks = p.works.some(w =>
        (w.title && w.title.toLowerCase().includes(q)) ||
        (w.original_author && w.original_author.toLowerCase().includes(q)) ||
        (w.bibliography && w.bibliography.toLowerCase().includes(q))
      );
      if (!inName && !inPseudo && !inBio && !inBirth && !inWorks) return false;
    }

    // Period
    if (activePeriod === 'dead' && !p.death) return false;
    if (activePeriod === 'alive' && p.death) return false;

    // Lang from
    if (lf) {
      const hasLf = p.works.some(w => w.lang_from && w.lang_from.split(',').map(l=>l.trim()).includes(lf));
      if (!hasLf) return false;
    }
    // Lang to
    if (lt) {
      const hasLt = p.works.some(w => w.lang_to && w.lang_to.split(',').map(l=>l.trim()).includes(lt));
      if (!hasLt) return false;
    }
    // Genre
    if (gn) {
      const hasGn = p.works.some(w => w.genre && w.genre.trim() === gn);
      if (!hasGn) return false;
    }

    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    if (sort === 'name') return (a.name||'').localeCompare(b.name||'', 'ru');
    if (sort === 'works') return b.works.length - a.works.length;
    if (sort === 'birth') {
      const ya = a.birth ? parseInt(a.birth) : 9999;
      const yb = b.birth ? parseInt(b.birth) : 9999;
      return ya - yb;
    }
    return 0;
  });

  document.getElementById('statsBar').innerHTML =
    `Найдено: <b>${filtered.length}</b> из <b>${DATA.length}</b> авторов`;

  const container = document.getElementById('cardsContainer');
  container.className = currentView === 'grid' ? 'grid-view' : 'list-view';

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Ничего не найдено.<br>Попробуйте изменить параметры поиска.</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(p => buildCard(p)).join('');
}

function buildCard(p) {
  const langs = getPersonLangs(p);
  const bd = formatDate(p.birth);
  const dd = formatDate(p.death);
  const dates = bd ? (dd ? `${bd} — ${dd}` : `Род. ${bd}`) : '';
  const langTags = [
    ...langs.from.slice(0,2).map(l => `<span class="lang-tag lang-from">${l}</span>`),
    ...langs.to.slice(0,2).map(l => `<span class="lang-tag lang-to">${l}</span>`)
  ].join('');

  if (currentView === 'list') {
    return `<div class="card" onclick="openModal(${p.id})">
      <div class="modal-avatar" style="width:40px;height:40px;font-size:1rem;flex-shrink:0;border-radius:50%;background:var(--surface2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--accent)">${getInitials(p.name)}</div>
      <div class="card-left">
        <div class="card-name">${p.name || '—'}</div>
        ${p.pseudonym ? `<div class="card-pseudo">${p.pseudonym}</div>` : ''}
        ${p.bio ? `<div class="card-bio">${p.bio}</div>` : ''}
      </div>
      <div class="card-right">
        <div class="card-dates">${dates}</div>
        <div class="card-langs">${langTags}</div>
        <div class="works-count"><b>${p.works.length}</b> работ</div>
      </div>
    </div>`;
  }

  return `<div class="card" onclick="openModal(${p.id})">
    <div class="card-name">${p.name || '—'}</div>
    ${p.pseudonym ? `<div class="card-pseudo">${p.pseudonym}</div>` : ''}
    ${dates ? `<div class="card-dates">${dates}</div>` : ''}
    ${p.bio ? `<div class="card-bio">${p.bio}</div>` : ''}
    <div class="card-langs">${langTags}</div>
    <div class="works-count"><b>${p.works.length}</b> переведённых произведений</div>
  </div>`;
}

function openModal(id) {
  const p = DATA.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modalAvatar').textContent = getInitials(p.name);
  document.getElementById('modalName').textContent = p.name || '—';

  const pseudo = document.getElementById('modalPseudo');
  if (p.pseudonym) { pseudo.textContent = 'Псевдоним: ' + p.pseudonym; pseudo.style.display = ''; }
  else pseudo.style.display = 'none';

  const bd = formatDate(p.birth), dd = formatDate(p.death);
  document.getElementById('modalDates').textContent =
    bd ? (dd ? `${bd} — ${dd}` : `Род. ${bd}`) : '';

  let body = '';

  // Биография
  if (p.bio) {
    body += `<div class="section-title">Биография</div><p class="info-text">${p.bio}</p>`;
  }

  // Ключевые данные
  const infoItems = [];
  if (p.birthplace) infoItems.push(['Место рождения', p.birthplace]);
  if (p.education) infoItems.push(['Образование', p.education]);
  if (p.unions) infoItems.push(['Членство в союзах', p.unions]);
  if (p.awards) infoItems.push(['Награды', p.awards]);

  if (infoItems.length > 0) {
    body += `<div class="section-title">Сведения</div><div class="info-grid">`;
    infoItems.forEach(([label, val]) => {
      body += `<div class="info-item"><div class="label">${label}</div><div class="value">${val}</div></div>`;
    });
    body += '</div>';
  }

  // Переводческая деятельность
  if (p.translation_char) {
    body += `<div class="section-title">Переводческая деятельность</div><p class="info-text">${p.translation_char}</p>`;
  }

  // Теги
  if (p.tags) {
    const tags = p.tags.split(',').map(t => t.trim()).filter(Boolean);
    body += `<div class="section-title">Теги</div><div class="tags-wrap">${tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}</div>`;
  }

  // Произведения
  if (p.works.length > 0) {
    body += `<div class="section-title">Переводы (${p.works.length})</div>
    <table class="works-table">
      <thead><tr>
        <th>Произведение / Автор</th>
        <th>Год</th>
        <th>Жанр</th>
        <th>Языки</th>
      </tr></thead>
      <tbody>`;
    p.works.forEach(w => {
      body += `<tr>
        <td>
          <div class="work-title">${w.title || '—'}</div>
          ${w.original_author ? `<div class="work-author">${w.original_author}</div>` : ''}
          ${w.bibliography ? `<div class="work-bib">${w.bibliography}</div>` : ''}
          ${w.notes ? `<div class="work-bib" style="color:var(--accent2)">* ${w.notes}</div>` : ''}
        </td>
        <td class="work-year">${w.year || '—'}</td>
        <td class="work-genre">${w.genre && w.genre !== '-' ? w.genre : '—'}</td>
        <td>
          <div class="lang-pair">
            ${w.lang_from ? `<span class="lang-tag lang-from" style="font-size:0.68rem">${w.lang_from}</span>` : ''}
            ${w.lang_to ? `<span class="lang-tag lang-to" style="font-size:0.68rem">${w.lang_to}</span>` : ''}
          </div>
        </td>
      </tr>`;
    });
    body += '</tbody></table>';
  }

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.closest('.modal-close')) return;
  if (e && e.target === document.getElementById('modal')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
render();
</script>
</body>
</html>
